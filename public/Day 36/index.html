<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fitness Tracker Dashboard</title>

<link rel="stylesheet" href="style.css">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

</head>

<body>

<!-- HEADER -->

<header class="hero">

<h1>🏋️ Fitness Tracker</h1>

<p>Track your workouts, monitor calories and stay fit every day</p>

</header>


<div class="container">

<!-- Recommendation -->

<div class="recommendation" id="recommendationBox">

Start your fitness journey today 💪

</div>


<!-- STATS -->

<div class="stats">

<div class="stat-card">

<h3>Activities</h3>

<p id="totalActivities">0</p>

</div>

<div class="stat-card">

<h3>Duration</h3>

<p id="totalDuration">0 min</p>

</div>

<div class="stat-card">

<h3>Calories</h3>

<p id="totalCalories">0 kcal</p>

</div>

</div>


<!-- ADD ACTIVITY -->

<div class="card">

<h2>Add Activity</h2>

<form id="fitnessForm">

<input type="text" id="activity" placeholder="Activity (Running, Yoga)" required>

<input type="number" id="duration" placeholder="Duration (minutes)" required>

<input type="number" id="calories" placeholder="Calories Burned" required>

<button type="submit">Add Activity</button>

</form>

</div>


<!-- GOAL -->

<div class="card">

<h2>Daily Goal Progress</h2>

<div class="progress-container">

<div id="progressBar" class="progress-bar"></div>

</div>

<p id="goalText">0 / 500 kcal</p>

</div>


<!-- CHART -->

<div class="card">

<h2>Calories Burned</h2>

<canvas id="calorieChart"></canvas>

</div>


<!-- HISTORY -->

<div class="card">

<h2>Activity History</h2>

<div id="activityList"></div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
