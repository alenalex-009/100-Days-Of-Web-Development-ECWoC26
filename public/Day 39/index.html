<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Online Learning Platform</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<header>

<h1><span>Online</span> Learning</h1>

<button id="themeToggle">🌙</button>

</header>


<section class="hero">

<h2>Learn Skills That Matter</h2>

<p>Choose a course, enroll, and start learning instantly.</p>

</section>



<section class="container">

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="Search courses..."
>

</div>


<h2>Available Courses</h2>

<div id="courseList" class="courses"></div>


<h2>Your Cart</h2>

<div id="cartList"></div>

<button id="checkoutBtn">Proceed to Payment</button>


<h2>My Courses</h2>

<div id="myCourses"></div>


</section>


<!-- PAYMENT MODAL -->

<div id="paymentModal" class="modal">

<div class="modal-content">

<h2>Payment Method</h2>

<p>Select payment option</p>

<button onclick="processPayment()">Pay Online</button>

<button onclick="closeModal()">Cancel</button>

</div>

</div>


<script src="script.js"></script>

</body>
</html>
