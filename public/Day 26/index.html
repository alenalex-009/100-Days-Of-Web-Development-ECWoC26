<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Advanced Image Gallery</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header class="hero">

<div class="hero-content">

<h1>📸 Image Gallery</h1>

<p>Explore beautiful collections of nature, animals, food and travel</p>

</div>

</header>
<!-- SEARCH -->

<input type="text" id="searchInput" placeholder="Search images..." class="search">

<!-- FILTER BUTTONS -->

<div class="filters">

<button data-category="all" class="active">All</button>
<button data-category="nature">Nature</button>
<button data-category="animals">Animals</button>
<button data-category="food">Food</button>
<button data-category="travel">Travel</button>

</div>


<!-- ADD IMAGE -->

<div class="add-image">

<input type="text" id="imageUrl" placeholder="Image URL">

<input type="text" id="imageCaption" placeholder="Caption">

<select id="imageCategory">
<option value="nature">Nature</option>
<option value="animals">Animals</option>
<option value="food">Food</option>
<option value="travel">Travel</option>
</select>

<button id="addImageBtn">Add Image</button>

</div>


<!-- GALLERY -->

<div class="gallery" id="gallery"></div>


<!-- LIGHTBOX -->

<div id="lightbox">

<span id="close">&times;</span>

<img id="lightbox-img">

<p id="lightbox-caption"></p>

</div>


<script src="script.js"></script>

</body>
</html>
